# Nova Invest CI
#
# Runs on every push to main and on every PR.
# - Lint + typecheck
# - Unit + integration tests (vitest)
# - Mock symbol sync check (per ADR-0002)
# - E2E tests (Playwright, mock mode only)
# - Build verification (Next.js production build)
#
# Per EP01 acceptance criteria: >= 80% unit test coverage.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts (esbuild, msw, sharp, workerd)
        run: pnpm approve-builds esbuild msw sharp workerd || true

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Check Mock symbol sync (ADR-0002)
        run: pnpm run check:mock-symbols

      - name: Unit + Integration tests
        run: pnpm test:coverage
        env:
          USE_MOCK: "true"
          ENVIRONMENT: "test"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          directory: web/coverage
          flags: unit
          fail_ci_if_error: false

      - name: Build
        run: pnpm build
        env:
          USE_MOCK: "true"
          ENVIRONMENT: "production"

  e2e:
    name: E2E Tests (Mock Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm approve-builds esbuild msw sharp workerd || true

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          USE_MOCK: "true"
          ENVIRONMENT: "test"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30
