<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">3-Stage Citation Validation Pipeline</text>

  <!-- Input -->
  <g transform="translate(50, 100)">
    <rect width="150" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">LLM Response</text>
    <text x="75" y="55" text-anchor="middle" font-size="11" fill="#3b82f6">facts + citations</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M200 140 L280 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 1 -->
  <g transform="translate(290, 100)">
    <rect width="180" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Stage 1: Structural</text>
    <text x="90" y="45" text-anchor="middle" font-size="10" fill="#b45309">• fact.numeric exists</text>
    <text x="90" y="60" text-anchor="middle" font-size="10" fill="#b45309">• fact.source.quote</text>
    <text x="90" y="75" text-anchor="middle" font-size="10" fill="#b45309">• fact.source.url</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M470 140 L550 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 2 -->
  <g transform="translate(560, 100)">
    <rect width="180" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Stage 2: Quote Verify</text>
    <text x="90" y="45" text-anchor="middle" font-size="10" fill="#059669">• RAG context check</text>
    <text x="90" y="60" text-anchor="middle" font-size="10" fill="#059669">• Whitespace normalize</text>
    <text x="90" y="75" text-anchor="middle" font-size="10" fill="#059669">• Case-sensitive match</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M740 140 L780 140" stroke="#64748b" stroke-width="2"/>
  <path d="M780 140 L780 220" stroke="#64748b" stroke-width="2"/>
  <path d="M780 220 L740 220" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 3 -->
  <g transform="translate(560, 180)">
    <rect width="180" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Stage 3: URL Check</text>
    <text x="90" y="45" text-anchor="middle" font-size="10" fill="#7c3aed">• Async validation</text>
    <text x="90" y="60" text-anchor="middle" font-size="10" fill="#7c3aed">• Redirect detection</text>
    <text x="90" y="75" text-anchor="middle" font-size="10" fill="#7c3aed">• SSRF mitigation</text>
  </g>

  <!-- RAG Context -->
  <g transform="translate(380, 220)">
    <rect width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="11" fill="#475569">RAG Context</text>
    <text x="80" y="48" text-anchor="middle" font-size="9" fill="#64748b">(D1 + Vectorize)</text>
  </g>

  <!-- Arrow from RAG -->
  <path d="M460 220 L650 220" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

  <!-- Output boxes -->
  <g transform="translate(50, 320)">
    <rect width="250" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">✓ all_verified</text>
    <text x="125" y="50" text-anchor="middle" font-size="11" fill="#16a34a">All citations valid</text>
    <text x="125" y="70" text-anchor="middle" font-size="10" fill="#15803d">→ Return answer unchanged</text>
    <rect x="20" y="85" width="210" height="45" rx="4" fill="#bbf7d0"/>
    <text x="125" y="110" text-anchor="middle" font-size="9" fill="#166534">confidence preserved</text>
  </g>

  <g transform="translate(330, 320)">
    <rect width="250" height="140" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#a16207">⚠ partial_strip</text>
    <text x="125" y="50" text-anchor="middle" font-size="11" fill="#ca8a04">Some citations invalid</text>
    <text x="125" y="70" text-anchor="middle" font-size="10" fill="#a16207">→ Keep verified facts only</text>
    <rect x="20" y="85" width="210" height="45" rx="4" fill="#fef08a"/>
    <text x="125" y="110" text-anchor="middle" font-size="9" fill="#854d0e">append disclaimer</text>
  </g>

  <g transform="translate(610, 320)">
    <rect width="250" height="140" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="125" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">✗ strict_reject</text>
    <text x="125" y="50" text-anchor="middle" font-size="11" fill="#dc2626">All citations invalid</text>
    <text x="125" y="70" text-anchor="middle" font-size="10" fill="#b91c1c">→ Replace with disclaimer</text>
    <rect x="20" y="85" width="210" height="45" rx="4" fill="#fecaca"/>
    <text x="125" y="110" text-anchor="middle" font-size="9" fill="#991b1b">confidence = 0</text>
  </g>

  <!-- Arrows to outputs -->
  <path d="M380 260 L175 320" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M500 260 L455 320" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M650 260 L735 320" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Labels -->
  <text x="200" y="295" font-size="10" fill="#64748b">100% match</text>
  <text x="420" y="295" font-size="10" fill="#64748b">partial</text>
  <text x="700" y="295" font-size="10" fill="#64748b">0% match</text>
</svg>