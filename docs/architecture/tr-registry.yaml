# Technical Requirements Registry
#
# Single source of truth for stable TR-IDs across all GDDs/Epics.
# Each requirement has a stable ID that persists across reviews.
# Stories and tests reference these IDs.
#
# Naming convention: TR-EPXX-NNN (Epic number + 3-digit sequence)
# Status: active | deprecated
# When a GDD requirement is removed, mark status: deprecated (never delete)
#
# Last Updated: 2026-07-19 (v5 after ADR-0010 + ADR-0012 + ADR-0013)
# Version: 5
# Total TRs: 130
# Generated by: /architecture-review (initial pass + re-runs)
# v2 changes: Added owner_adr fields for ADR-0004 (Agent Loop) and ADR-0011 (D1 Schema)
# v3 changes:
#   - Fixed Total TRs count: 86 -> 130 (arithmetic error in v2 header; per-Epic breakdowns always summed to 130)
#   - Added owner_adr fields for 11 newly covered TRs:
#     * ADR-0005 (Memory Layer): TR-EP01-005, TR-EP03-009, TR-EP03-017, TR-EP03-018
#     * ADR-0006 (Tool Protocol): TR-EP01-004, TR-EP02-008, TR-EP03-011
#     * ADR-0007 (Citation Validator): TR-EP01-008, TR-EP03-005, TR-EP03-007, TR-EP03-020
#   - See docs/architecture/architecture-review-2026-07-19-v3.md for full v3 review

